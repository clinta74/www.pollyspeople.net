<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 520" aria-hidden="true">
  <defs>

    <!-- Brass / bronze finish — tarnished aged brass -->
    <linearGradient id="brass-v" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#4e3410"/>
      <stop offset="30%"  stop-color="#72521a"/>
      <stop offset="55%"  stop-color="#8c6c24"/>
      <stop offset="75%"  stop-color="#5e4214"/>
      <stop offset="100%" stop-color="#342208"/>
    </linearGradient>
    <linearGradient id="brass-h" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"   stop-color="#60461a"/>
      <stop offset="40%"  stop-color="#806024"/>
      <stop offset="100%" stop-color="#2e1c06"/>
    </linearGradient>

    <!-- Frosted glass tube — the elongated glass diffuser -->
    <linearGradient id="glass-tube" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#2a2820" stop-opacity="0.9"/>
      <stop offset="12%"  stop-color="#8a8060" stop-opacity="0.6"/>
      <stop offset="30%"  stop-color="#f0e8c0" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="70%"  stop-color="#f0e8c0" stop-opacity="0.85"/>
      <stop offset="88%"  stop-color="#8a8060" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2a2820" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glass tube when LIT — warm amber glow -->
    <linearGradient id="glass-tube-lit" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#3a2808" stop-opacity="0.9"/>
      <stop offset="12%"  stop-color="#c87820" stop-opacity="0.7"/>
      <stop offset="30%"  stop-color="#ffe090" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1.0"/>
      <stop offset="70%"  stop-color="#ffe090" stop-opacity="0.9"/>
      <stop offset="88%"  stop-color="#c87820" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3a2808" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Warm outer glow spread (radial, centred on glass tube) -->
    <radialGradient id="tube-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%"   stop-color="#f5c040" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#f5c040" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="tube-glow-lit" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%"   stop-color="#ffe8a0" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#f5c040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f5a800" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Wall back-plate: dark steel panel -->
    <linearGradient id="plate" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#0a0a12"/>
      <stop offset="50%"  stop-color="#1e1e2a"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>

    <!-- Stepped cap face — tarnished -->
    <linearGradient id="cap" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#2e1c06"/>
      <stop offset="30%"  stop-color="#6a4e16"/>
      <stop offset="60%"  stop-color="#88681e"/>
      <stop offset="100%" stop-color="#4a3410"/>
    </linearGradient>

    <!-- Rivet dome — tarnished -->
    <radialGradient id="riv-b" cx="30%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#907030"/>
      <stop offset="50%"  stop-color="#4a3210"/>
      <stop offset="100%" stop-color="#1e1206"/>
    </radialGradient>

    <!-- Filters -->
    <!-- Tube glow filter (appended to glass rect when active) -->
    <filter id="glow-filter" x="-80%" y="-10%" width="260%" height="120%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

  </defs>

  <!--
    LEFT-side Art Deco wall sconce.
    The fixture sits flush against the LEFT edge of the viewport (x=0 = wall).
    Glass tube runs vertically, centred in the bracket, lit from within.
    Brass bracket has two square stepped caps (top & bottom), a central
    wall plate, and pairs of rivet rows on each cap face.

    Overall layout (y axis, 520 tall):
      0–30   : top cap step 1 (widest)
      30–60  : top cap step 2 (narrower)
      60–80  : top cap step 3 (narrowest, transitions to wall plate)
      80–440 : wall plate + glass tube body
      440–460: bottom cap step 3
      460–490: bottom cap step 2
      490–520: bottom cap step 1
  -->

  <!-- ── WALL BACK-PLATE ── -->
  <rect x="0" y="0" width="32" height="516" fill="url(#plate)"/>

  <!-- ── GLOW HALO behind tube (visible only when lit — toggled via class) ── -->
  <rect class="tube-glow-rect" x="0" y="64" width="110" height="392"
        fill="url(#tube-glow)" rx="6"/>

  <!-- ── GLASS TUBE BODY ── -->
  <!-- Shadow/depth rect behind the tube -->
  <rect x="29" y="64" width="52" height="392" fill="#080810" rx="4"/>
  <!-- Main tube -->
  <rect class="glass-tube-rect" x="32" y="64" width="46" height="392"
        fill="url(#glass-tube)" rx="3"/>
  <!-- Centre highlight line on the glass -->
  <rect x="53" y="64" width="4" height="392" fill="white" fill-opacity="0.18" rx="2"/>

  <!-- ── TOP CAP — 3 stepped brass layers, centred on tube at x=55 ── -->
  <!-- Widest step -->
  <rect x="1"  y="0"  width="108" height="30" fill="url(#brass-h)" rx="2"/>
  <rect x="1"  y="0"  width="108" height="4"  fill="#e8c060" fill-opacity="0.14" rx="2"/>
  <!-- Rivets top step -->
  <circle cx="13"  cy="17" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="27"  cy="17" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="83"  cy="17" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="97"  cy="17" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>

  <!-- Middle step -->
  <rect x="9"  y="30" width="92" height="20" fill="url(#brass-h)" rx="2"/>
  <rect x="9"  y="30" width="92" height="3"  fill="#e8c060" fill-opacity="0.10" rx="2"/>
  <circle cx="21" cy="40" r="3.5" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="89" cy="40" r="3.5" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>

  <!-- Narrowest collar -->
  <rect x="19" y="50" width="72" height="14" fill="url(#brass-h)" rx="1"/>
  <rect x="19" y="50" width="72" height="2"  fill="#e8c060" fill-opacity="0.08" rx="1"/>
  <!-- Engraved Art Deco line pair on collar -->
  <rect x="27" y="54" width="56" height="2" fill="#3a2c08" rx="0.5"/>
  <rect x="27" y="58" width="56" height="1" fill="#c9952a" fill-opacity="0.5" rx="0.5"/>

  <!-- Side vertical rail (left of tube) -->
  <rect x="24" y="64" width="8" height="392" fill="url(#brass-v)" rx="1"/>
  <!-- Engraved reeded lines on rail -->
  <rect x="26" y="72" width="1.5" height="376" fill="#3a2c08" fill-opacity="0.5"/>
  <rect x="29" y="72" width="1.5" height="376" fill="#e8c060" fill-opacity="0.25"/>

  <!-- Side vertical rail (right of tube) -->
  <rect x="78" y="64" width="8" height="392" fill="url(#brass-v)" rx="1"/>
  <rect x="80" y="72" width="1.5" height="376" fill="#3a2c08" fill-opacity="0.5"/>
  <rect x="83" y="72" width="1.5" height="376" fill="#e8c060" fill-opacity="0.25"/>

  <!-- ── BOTTOM CAP — mirror of top ── -->
  <!-- Tarnish patina overlays on both caps -->
  <rect x="1"  y="0"   width="108" height="64"  fill="#283010" fill-opacity="0.28" rx="2"/>
  <rect x="1"  y="456" width="108" height="64"  fill="#283010" fill-opacity="0.28" rx="2"/>
  <!-- Narrowest collar -->
  <rect x="19" y="456" width="72" height="14" fill="url(#brass-h)" rx="1"/>
  <rect x="19" y="468" width="72" height="2"  fill="#3a2c08" fill-opacity="0.4" rx="1"/>
  <rect x="27" y="458" width="56" height="2" fill="#3a2c08" rx="0.5"/>
  <rect x="27" y="461" width="56" height="1" fill="#c9952a" fill-opacity="0.5" rx="0.5"/>

  <!-- Middle step -->
  <rect x="9"  y="470" width="92" height="20" fill="url(#brass-h)" rx="2"/>
  <rect x="9"  y="488" width="92" height="3"  fill="#3a2c08" fill-opacity="0.4" rx="2"/>
  <circle cx="21" cy="480" r="3.5" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="89" cy="480" r="3.5" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>

  <!-- Widest step -->
  <rect x="1"  y="490" width="108" height="30" fill="url(#brass-h)" rx="2"/>
  <rect x="1"  y="516" width="108" height="4"  fill="#3a2c08" fill-opacity="0.5" rx="2"/>
  <circle cx="13"  cy="503" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="27"  cy="503" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="83"  cy="503" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="97"  cy="503" r="4" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="0.8"/>

  <!-- ── WALL MOUNT SCREWS ── -->
  <circle cx="12" cy="160" r="5" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="1"/>
  <circle cx="12" cy="260" r="5" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="1"/>
  <circle cx="12" cy="360" r="5" fill="url(#riv-b)" stroke="#3a2c08" stroke-width="1"/>
  <!-- Screw slot lines -->
  <rect x="9" y="156" width="6" height="1.5" fill="#3a2c08" rx="0.3"/>
  <rect x="9" y="256" width="6" height="1.5" fill="#3a2c08" rx="0.3"/>
  <rect x="9" y="356" width="6" height="1.5" fill="#3a2c08" rx="0.3"/>

</svg>
