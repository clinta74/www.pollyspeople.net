<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 520" aria-hidden="true">
  <defs>
    <linearGradient id="brass-v-r" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#342208"/>
      <stop offset="25%"  stop-color="#5e4214"/>
      <stop offset="45%"  stop-color="#8c6c24"/>
      <stop offset="70%"  stop-color="#72521a"/>
      <stop offset="100%" stop-color="#4e3410"/>
    </linearGradient>
    <linearGradient id="brass-h-r" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"   stop-color="#60461a"/>
      <stop offset="40%"  stop-color="#806024"/>
      <stop offset="100%" stop-color="#2e1c06"/>
    </linearGradient>
    <linearGradient id="glass-tube-r" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#2a2820" stop-opacity="0.9"/>
      <stop offset="12%"  stop-color="#8a8060" stop-opacity="0.6"/>
      <stop offset="30%"  stop-color="#f0e8c0" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="70%"  stop-color="#f0e8c0" stop-opacity="0.85"/>
      <stop offset="88%"  stop-color="#8a8060" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2a2820" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="plate-r" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#0a0a12"/>
      <stop offset="50%"  stop-color="#1e1e2a"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <radialGradient id="riv-br" cx="30%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#907030"/>
      <stop offset="50%"  stop-color="#4a3210"/>
      <stop offset="100%" stop-color="#1e1206"/>
    </radialGradient>
    <radialGradient id="tube-glow-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5c040" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#f5c040" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- RIGHT-side sconce: mirror of left. Wall is at x=110. -->

  <!-- Wall back-plate (right edge) -->
  <rect x="78" y="0" width="32" height="516" fill="url(#plate-r)"/>

  <!-- Glow halo (toggled by class) -->
  <rect class="tube-glow-rect" x="0" y="64" width="110" height="392"
        fill="url(#tube-glow-r)" rx="6"/>

  <!-- Glass tube -->
  <rect x="29" y="64" width="52" height="392" fill="#080810" rx="4"/>
  <rect class="glass-tube-rect" x="32" y="64" width="46" height="392"
        fill="url(#glass-tube-r)" rx="3"/>
  <rect x="53" y="64" width="4" height="392" fill="white" fill-opacity="0.18" rx="2"/>

  <!-- TOP CAP (centred at x=55) -->
  <rect x="1"  y="0"  width="108" height="30" fill="url(#brass-h-r)" rx="2"/>
  <rect x="1"  y="0"  width="108" height="4"  fill="#e8c060" fill-opacity="0.14" rx="2"/>
  <circle cx="13"  cy="17" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="27"  cy="17" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="83"  cy="17" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="97"  cy="17" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>

  <rect x="9"  y="30" width="92" height="20" fill="url(#brass-h-r)" rx="2"/>
  <rect x="9"  y="30" width="92" height="3"  fill="#e8c060" fill-opacity="0.10" rx="2"/>
  <circle cx="21" cy="40" r="3.5" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="89" cy="40" r="3.5" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>

  <rect x="19" y="50" width="72" height="14" fill="url(#brass-h-r)" rx="1"/>
  <rect x="19" y="50" width="72" height="2"  fill="#e8c060" fill-opacity="0.08" rx="1"/>
  <rect x="27" y="54" width="56" height="2" fill="#3a2c08" rx="0.5"/>
  <rect x="27" y="58" width="56" height="1" fill="#c9952a" fill-opacity="0.5" rx="0.5"/>

  <!-- Side rails -->
  <rect x="78" y="64" width="8" height="392" fill="url(#brass-v-r)" rx="1"/>
  <rect x="80" y="72" width="1.5" height="376" fill="#3a2c08" fill-opacity="0.5"/>
  <rect x="83" y="72" width="1.5" height="376" fill="#e8c060" fill-opacity="0.25"/>

  <rect x="24" y="64" width="8" height="392" fill="url(#brass-v-r)" rx="1"/>
  <rect x="26" y="72" width="1.5" height="376" fill="#3a2c08" fill-opacity="0.5"/>
  <rect x="29" y="72" width="1.5" height="376" fill="#e8c060" fill-opacity="0.25"/>

  <!-- BOTTOM CAP -->
  <!-- Tarnish patina overlays on both caps -->
  <rect x="1"  y="0"   width="108" height="64"  fill="#283010" fill-opacity="0.28" rx="2"/>
  <rect x="1"  y="456" width="108" height="64"  fill="#283010" fill-opacity="0.28" rx="2"/>
  <!-- Narrowest collar -->
  <rect x="19" y="456" width="72" height="14" fill="url(#brass-h-r)" rx="1"/>
  <rect x="19" y="468" width="72" height="2"  fill="#3a2c08" fill-opacity="0.4" rx="1"/>
  <rect x="27" y="458" width="56" height="2" fill="#3a2c08" rx="0.5"/>
  <rect x="27" y="461" width="56" height="1" fill="#c9952a" fill-opacity="0.5" rx="0.5"/>

  <rect x="9"  y="470" width="92" height="20" fill="url(#brass-h-r)" rx="2"/>
  <rect x="9"  y="488" width="92" height="3"  fill="#3a2c08" fill-opacity="0.4" rx="2"/>
  <circle cx="21" cy="480" r="3.5" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="89" cy="480" r="3.5" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>

  <rect x="1"  y="490" width="108" height="30" fill="url(#brass-h-r)" rx="2"/>
  <rect x="1"  y="516" width="108" height="4"  fill="#3a2c08" fill-opacity="0.5" rx="2"/>
  <circle cx="13"  cy="503" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="27"  cy="503" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="83"  cy="503" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>
  <circle cx="97"  cy="503" r="4" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="0.8"/>

  <!-- Wall mount screws -->
  <circle cx="98" cy="160" r="5" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="1"/>
  <circle cx="98" cy="260" r="5" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="1"/>
  <circle cx="98" cy="360" r="5" fill="url(#riv-br)" stroke="#3a2c08" stroke-width="1"/>

</svg>
