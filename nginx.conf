server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets if available
    gzip_static on;

    # Cache hashed assets forever, revalidate everything else
    location ~* "\.(js|css|svg|png|jpg|jpeg|gif|webp|woff2?)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }
}
